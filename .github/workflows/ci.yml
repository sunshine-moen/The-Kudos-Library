name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run type-check

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm test

  integration:
    name: Integration + E2E
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kudos
          POSTGRES_PASSWORD: kudos
          POSTGRES_DB: kudos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kudos:kudos@localhost:5432/kudos_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
      AG_TENANT_ID: 00000000-0000-0000-0000-000000000001
      RESEND_API_KEY: re_ci_placeholder
      RESEND_FROM_EMAIL: kudos@example.com
      CRON_SECRET: ci-cron-secret
      GIPHY_API_KEY: ""

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed AG tenant
        run: npx tsx scripts/seed/seed-ag-tenant.ts

      - name: Seed test tenant
        run: npx tsx scripts/seed/seed-test-tenant.ts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via Vercel
        run: echo "Staging deploy wired in Phase F (REB-63)"
